{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-8">
    <div class="card shadow-sm">
      <div class="card-body">
        <h4 class="card-title mb-3">Edit Student</h4>
        <form method="post">
          <div class="mb-3">
            <label class="form-label">Student ID</label>
            <input name="student_id" class="form-control" value="{{ student['student_id'] }}" {% if teacher_mode %}readonly{% endif %} required>
          </div>
          <div class="mb-3">
            <label class="form-label">Name</label>
            <input name="name" class="form-control" value="{{ student['name'] }}" {% if teacher_mode %}readonly{% endif %} required>
          </div>
          <div class="mb-3">
            <label class="form-label">Email</label>
            <input name="email" class="form-control" value="{{ student['email'] }}" {% if teacher_mode %}readonly{% endif %}>
          </div>
          <div class="mb-3">
            <label class="form-label">Course</label>
            <input name="course" class="form-control" value="{{ student['course'] }}" {% if teacher_mode %}readonly{% endif %}>
          </div>
          <div class="mb-3">
            <label class="form-label">Marks</label>
            <input name="marks" class="form-control" type="number" min="0" max="100" value="{{ student['marks'] or '' }}">
          </div>
          <button class="btn btn-primary" type="submit">Save</button>
          <a class="btn btn-secondary" href="{% if teacher_mode %}{{ url_for('teacher_dashboard') }}{% else %}{{ url_for('admin_dashboard') }}{% endif %}">Cancel</a>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
