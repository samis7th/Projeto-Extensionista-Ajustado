{% extends 'base.html' %}
{% block content %}
<h3>Teacher Dashboard</h3>
<div class="row mb-3 gx-2">
  <div class="col-md-6">
    <form action="{{ url_for('teacher_dashboard') }}" method="get" class="mb-3">
      <div class="input-group">
        <select name="course" class="form-select">
          <option value="">All Courses</option>
          {% for course in courses %}
            <option value="{{ course }}" {% if course == selected_course %}selected{% endif %}>{{ course }}</option>
          {% endfor %}
        </select>
        <button class="btn btn-outline-primary" type="submit">Filter</button>
      </div>
    </form>
  </div>
  <div class="col-md-6">
    <form action="{{ url_for('import_csv') }}" method="post" enctype="multipart/form-data" class="mb-3">
      <div class="input-group">
        <input type="file" name="file" accept=".csv" class="form-control" required>
        <button class="btn btn-success" type="submit">Import CSV</button>
      </div>
    </form>
  </div>
</div>
{% if students|length == 0 %}
  <div class="alert alert-secondary">No students assigned to your course.</div>
{% else %}
  <ul class="list-group">
    {% for s in students %}
      <li class="list-group-item d-flex justify-content-between align-items-center">
        <div>
          <strong>{{ s['name'] }}</strong><br>
          <small class="text-muted">{{ s['student_id'] }} — {{ s['course'] }}</small>
        </div>
        <div>
          <a class="btn btn-sm btn-outline-secondary" href="{{ url_for('edit', stu_id=s['id']) }}">Edit</a>
        </div>
      </li>
    {% endfor %}
  </ul>
{% endif %}
{% endblock %}
